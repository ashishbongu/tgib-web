version: "3.9"

services:

  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.backend
    container_name: tgib-backend
    ports:
      - "8000:8000"
    environment:
      - TGIB_WEIGHTS=/app/tgib_weights.pkl
    volumes:
      - ./backend/app:/app/app          # live reload in dev
      - tgib_weights:/app/weights
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.frontend
    container_name: tgib-frontend
    ports:
    - "3001:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  tgib_weights:
